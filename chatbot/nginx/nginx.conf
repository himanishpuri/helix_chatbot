events {
    worker_connections 1024;
}

http {
    # Rate limiting — 5 requests/min per IP
    limit_req_zone $binary_remote_addr zone=chatbot:10m rate=5r/m;

    server {
        listen 80;

        # Chat API
        location /api/chat {
            limit_req zone=chatbot burst=3 nodelay;

            proxy_pass http://gateway:8000/chat;
            proxy_http_version 1.1;

            # SSE required headers
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check (no rate limit)
        location /api/health {
            proxy_pass http://gateway:8000/health;
        }

        # Serve frontend widget
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
}
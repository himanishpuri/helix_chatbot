events {
    worker_connections 1024;
}

http {
    # Single gateway today; least_conn favours shorter SSE queues if replicas are added.
    upstream gateway_backends {
        least_conn;
        server gateway:8000;
    }

    # Rate limiting — 20 requests/min per IP (campus/office NAT-friendly)
    limit_req_zone $binary_remote_addr zone=chatbot:10m rate=20r/m;

    server {
        listen 80;

        # Chat API
        location /api/chat {
            limit_req zone=chatbot burst=10 delay=5;

            proxy_pass http://gateway_backends/chat;
            proxy_http_version 1.1;

            # SSE required headers
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check (no rate limit)
        location /api/health {
            proxy_pass http://gateway_backends/health;
        }

        # Serve frontend widget
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
}
